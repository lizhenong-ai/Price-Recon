name: Scrape competitor prices

# Adds a "Run workflow" button on the Actions tab (workflow_dispatch) and also
# runs automatically every 6 hours. Runs scrape.py, then commits the refreshed
# prices.json / price_history.json / scrape_report.json back to the repo so the
# GitHub Pages dashboard serves the latest data.

on:
  workflow_dispatch:
    inputs:
      categories:
        description: "Comma-separated categories to scrape (leave blank = all)"
        required: false
        default: ""
      limit:
        description: "Cap total fetches (0 = no cap; use a small number for a quick smoke test)"
        required: false
        default: "0"
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours (UTC)

permissions:
  contents: write

# Never let two scrape runs overlap (they both push to main).
concurrency:
  group: scrape-prices
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright + Chromium
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Run scraper
        env:
          CATEGORIES: ${{ inputs.categories }}
          LIMIT: ${{ inputs.limit }}
        run: |
          ARGS=()
          if [ -n "$CATEGORIES" ]; then ARGS+=(--categories "$CATEGORIES"); fi
          if [ -n "$LIMIT" ] && [ "$LIMIT" != "0" ]; then ARGS+=(--limit "$LIMIT"); fi
          python scrape.py "${ARGS[@]}"

      - name: Commit refreshed prices
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json price_history.json scrape_report.json
          if git diff --staged --quiet; then
            echo "No price changes to commit."
          else
            git commit -m "Update prices (automated scrape) [skip ci]"
            git pull --rebase --autostash origin main
            git push
          fi
